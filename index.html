<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="グループ生成">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#05070c">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>iPad版 ランダムグループ生成</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070c;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #f8fafc;
      --muted: #a7b1c2;
      --line: #334155;
      --accent: #c8ff5a;
      --accent2: #38bdf8;
      --male: #74c0fc;
      --female: #f472b6;
      --danger: #fca5a5;
      --shadow: 0 12px 32px rgba(0, 0, 0, 0.34);
    }

    body.theme-light {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel2: #eef3f7;
      --text: #172033;
      --muted: #647083;
      --line: #d7dee8;
      --accent: #0f766e;
      --accent2: #2563eb;
      --male: #2563eb;
      --female: #db2777;
      --danger: #b42318;
      --shadow: 0 12px 30px rgba(20, 31, 48, 0.10);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    button, input { font: inherit; }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px max(22px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .status-pill,
    .theme-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      white-space: nowrap;
    }

    .status-pill { color: var(--muted); }
    .theme-btn { cursor: pointer; -webkit-tap-highlight-color: transparent; }

    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(360px, 1.4fr) minmax(170px, 0.55fr);
      gap: 12px;
      align-items: stretch;
      margin: 14px 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .control-panel,
    .action-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .class-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(58px, 1fr));
      gap: 8px;
    }

    .class-btn,
    .action-btn {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .class-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #111827;
      font-weight: 800;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      align-items: center;
    }

    label { color: var(--muted); font-size: 14px; }

    input {
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 255, 90, 0.18);
    }

    .mode-block {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel2);
    }

    .mode-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #111827;
      font-weight: 800;
    }

    .action-btn.secondary {
      border-color: var(--accent2);
      background: var(--accent2);
      color: #06111f;
      font-weight: 800;
    }

    .action-btn.export {
      border-color: var(--line);
      background: var(--panel);
      color: var(--text);
      font-weight: 800;
    }

    .info-panel {
      display: grid;
      place-items: center;
      min-width: 170px;
      padding: 14px;
      text-align: center;
    }

    .class-name { font-size: 26px; font-weight: 800; }

    .counts {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .count {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 8px;
      background: var(--panel2);
    }

    .message {
      min-height: 22px;
      margin: 8px 0 12px;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
      font-weight: 800;
    }

    .groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding-bottom: 20px;
      touch-action: pan-y;
    }

    .group-card {
      min-height: 132px;
      padding: 12px;
      border: 1px solid var(--line);
      border-top: 5px solid var(--accent);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .group-title { font-weight: 800; }

    .group-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .members {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .member {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 32px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel2);
      font-weight: 800;
    }

    .member .sex {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .member.m { border-color: var(--male); }
    .member.f { border-color: var(--female); }
    .member.m .sex { color: var(--male); }
    .member.f .sex { color: var(--female); }

    .copyright {
      margin: 10px 0 0;
      padding: 10px 0 2px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .board-exit {
      display: none;
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      right: 10px;
      z-index: 20;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    body.board-mode {
      overflow: auto;
    }

    body.board-mode .app {
      width: 100%;
      padding: max(8px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
    }

    body.board-mode header,
    body.board-mode .controls,
    body.board-mode .message,
    body.board-mode .copyright {
      display: none;
    }

    body.board-mode .groups {
      min-height: calc(100vh - 18px);
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      align-content: start;
      padding-bottom: 0;
    }

    body.board-mode .group-card {
      min-height: 118px;
      padding: 14px;
    }

    body.board-mode .group-title {
      font-size: 20px;
    }

    body.board-mode .group-count {
      font-size: 13px;
    }

    body.board-mode .member {
      min-height: 42px;
      padding: 0 13px;
      font-size: 24px;
    }

    body.board-mode .member .sex {
      font-size: 13px;
    }

    body.board-mode .board-exit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 940px) {
      header { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .controls { grid-template-columns: 1fr; }
      .info-panel { min-height: 96px; }
    }

    @media (max-width: 520px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .class-grid, .field-grid, .button-row { grid-template-columns: 1fr; }
      .groups { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>ランダムグループ生成</h1>
        <div class="subtitle">最低人数を基準に、人数優先でグループを作ります</div>
      </div>
      <div class="top-actions">
        <button class="theme-btn" type="button" id="themeBtn">ライト</button>
        <div class="status-pill" id="summary">クラスを選択してください</div>
      </div>
    </header>

    <section class="controls" aria-label="設定">
      <div class="panel control-panel">
        <div class="class-grid">
          <button class="class-btn" type="button" data-class-id="11">11組</button>
          <button class="class-btn" type="button" data-class-id="12">12組</button>
          <button class="class-btn" type="button" data-class-id="13">13組</button>
          <button class="class-btn" type="button" data-class-id="14">14組</button>
        </div>
        <div class="field-grid">
          <label for="minSize">最低人数</label>
          <input id="minSize" type="number" min="1" value="3" inputmode="numeric">
        </div>
        <div class="field-grid">
          <label for="skipNumbers">除外番号</label>
          <input id="skipNumbers" type="text" placeholder="例: 3, 17" inputmode="numeric">
        </div>
      </div>

      <div class="panel action-panel">
        <div class="mode-block">
          <div class="mode-title">A. 性別関係なく人数で割り振る</div>
          <div class="button-row">
            <button class="action-btn primary" type="button" id="countOrderedBtn">番号順</button>
            <button class="action-btn secondary" type="button" id="countRandomBtn">ランダム</button>
          </div>
        </div>
        <div class="mode-block">
          <div class="mode-title">B. 性別ができるだけ均等になるように人数を割り振る</div>
          <div class="button-row">
            <button class="action-btn primary" type="button" id="genderOrderedBtn">番号順</button>
            <button class="action-btn secondary" type="button" id="genderRandomBtn">ランダム</button>
          </div>
        </div>
        <button class="action-btn export" type="button" id="exportBtn">JPG保存</button>
      </div>

      <div class="panel info-panel" id="classInfo">
        <div>
          <div class="class-name">未選択</div>
          <div class="counts">
            <span class="count">男子 0</span>
            <span class="count">女子 0</span>
          </div>
        </div>
      </div>
    </section>

    <div class="message" id="message">クラスと最低人数を確認して、AまたはBの方式を選んでください。</div>
    <main class="groups" id="groups"></main>
    <button class="board-exit" type="button" id="boardExitBtn">設定</button>
    <footer class="copyright">Copyright HOSOI Toshikatsu</footer>
  </div>

  <script>
    const CLASS_DATA = {
      "11": {1:"M",2:"M",3:"F",4:"M",5:"M",6:"F",7:"M",8:"M",9:"M",10:"M",11:"F",12:"M",13:"F",14:"M",15:"M",16:"F",17:"M",18:"M",19:"M",20:"F"},
      "12": {1:"F",2:"F",3:"M",4:"M",5:"M",6:"M",7:"M",8:"F",9:"F",10:"M",11:"F",12:"M",13:"M",14:"M",15:"F",16:"M",17:"M",18:"M",19:"F",20:"F",21:"F",22:"M",23:"F",24:"M",25:"F",26:"F",27:"F",28:"M",29:"M",30:"F",31:"M",32:"M",33:"F",34:"M",35:"F",36:"F",37:"M"},
      "13": {1:"F",2:"F",3:"M",4:"F",5:"F",6:"F",7:"M",8:"M",9:"F",10:"F",11:"M",12:"F",13:"M",14:"M",15:"M",16:"M",17:"F",18:"M",19:"M",20:"M",21:"F",22:"F",23:"M",24:"M",25:"M",26:"F",27:"M",28:"F",29:"M",30:"M",31:"F",32:"F",33:"M",34:"M",35:"F",36:"M",37:"M"},
      "14": {1:"F",2:"M",3:"M",4:"M",5:"M",6:"M",7:"M",8:"M",9:"M",10:"M",11:"M",12:"F",13:"M",14:"F",15:"F",16:"F",17:"F",18:"F",19:"M",20:"F",21:"M",22:"F",23:"F",24:"M",25:"M",26:"F",27:"M",28:"M",29:"M",30:"F",31:"M",32:"F",33:"F",34:"M",35:"F",36:"F",37:"M"}
    };

    const colors = ["#ff6b6b", "#ffa94d", "#4ecdc4", "#a78bfa", "#f06595", "#74c0fc", "#69db7c", "#ffd43b"];
    const classInfo = document.querySelector("#classInfo");
    const groupsEl = document.querySelector("#groups");
    const message = document.querySelector("#message");
    const summary = document.querySelector("#summary");
    const minSizeInput = document.querySelector("#minSize");
    const skipNumbers = document.querySelector("#skipNumbers");
    const themeBtn = document.querySelector("#themeBtn");
    const exportBtn = document.querySelector("#exportBtn");
    const boardExitBtn = document.querySelector("#boardExitBtn");
    let lastResult = null;
    let pinchStartDistance = 0;

    function loadSetting(key, fallback) {
      try { return localStorage.getItem(key) || fallback; } catch (error) { return fallback; }
    }

    function saveSetting(key, value) {
      try { localStorage.setItem(key, value); } catch (error) {}
    }

    let currentClass = loadSetting("ipad-group-current-class", "11");

    function numbersFor(cls) {
      return Object.keys(CLASS_DATA[cls]).map(Number).sort((a, b) => a - b);
    }

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    function setTheme(theme) {
      const light = theme === "light";
      document.body.classList.toggle("theme-light", light);
      themeBtn.textContent = light ? "ダーク" : "ライト";
      saveSetting("ipad-group-theme", theme);
    }

    function selectClass(cls) {
      currentClass = CLASS_DATA[cls] ? cls : "11";
      saveSetting("ipad-group-current-class", currentClass);
      document.querySelectorAll(".class-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.classId === currentClass);
      });

      const roster = CLASS_DATA[currentClass];
      const nums = numbersFor(currentClass);
      const maleCount = nums.filter((num) => roster[num] === "M").length;
      const femaleCount = nums.filter((num) => roster[num] === "F").length;
      classInfo.innerHTML = `
        <div>
          <div class="class-name">${currentClass}組</div>
          <div class="counts">
            <span class="count">合計 ${nums.length}</span>
            <span class="count">男子 ${maleCount}</span>
            <span class="count">女子 ${femaleCount}</span>
          </div>
        </div>`;
      summary.textContent = `${currentClass}組 / ${nums.length}人`;
      setMessage("クラスと最低人数を確認して、AまたはBの方式を選んでください。");
    }

    function shuffle(list) {
      const result = [...list];
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function parseSkipNumbers() {
      return skipNumbers.value
        .split(/[,\s、]+/)
        .map((value) => Number.parseInt(value, 10))
        .filter((value, index, array) => Number.isFinite(value) && array.indexOf(value) === index);
    }

    function makeGroupSizes(total, minSize) {
      const groupCount = Math.floor(total / minSize);
      const extra = total - groupCount * minSize;
      return Array.from({ length: groupCount }, (_, index) => {
        return index >= groupCount - extra ? minSize + 1 : minSize;
      });
    }

    function sortGroup(group) {
      return group.sort((a, b) => a.num - b.num);
    }

    function buildCountGroups(active, roster, sizes, randomize) {
      let members = active.map((num) => ({ num, sex: roster[num] }));
      if (randomize) members = shuffle(members);

      let cursor = 0;
      return sizes.map((size) => {
        const group = members.slice(cursor, cursor + size);
        cursor += size;
        return sortGroup(group);
      });
    }

    function chooseFemaleTargets(sizes, femaleCount) {
      const total = sizes.reduce((sum, size) => sum + size, 0);
      const ratio = total ? femaleCount / total : 0;
      let dp = Array.from({ length: femaleCount + 1 }, () => null);
      dp[0] = { score: 0, counts: [] };

      sizes.forEach((size) => {
        const next = Array.from({ length: femaleCount + 1 }, () => null);
        dp.forEach((state, currentCount) => {
          if (!state) return;
          const maxFemale = Math.min(size, femaleCount - currentCount);
          for (let f = 0; f <= maxFemale; f += 1) {
            const nextCount = currentCount + f;
            const groupRatio = size ? f / size : 0;
            const singlePenalty = f === 1 ? 100000 : 0;
            const balancePenalty = Math.pow(groupRatio - ratio, 2) * 100;
            const score = state.score + singlePenalty + balancePenalty;
            if (!next[nextCount] || score < next[nextCount].score) {
              next[nextCount] = { score, counts: [...state.counts, f] };
            }
          }
        });
        dp = next;
      });

      return dp[femaleCount] ? dp[femaleCount].counts : sizes.map(() => 0);
    }

    function buildGenderGroups(active, roster, sizes, randomize) {
      let femaleList = active.filter((num) => roster[num] === "F");
      let maleList = active.filter((num) => roster[num] === "M");
      if (randomize) {
        femaleList = shuffle(femaleList);
        maleList = shuffle(maleList);
      }

      const femaleTargets = chooseFemaleTargets(sizes, femaleList.length);
      let femaleCursor = 0;
      let maleCursor = 0;

      return sizes.map((size, index) => {
        const group = [];
        const femaleNeeded = femaleTargets[index];
        const maleNeeded = size - femaleNeeded;

        for (let i = 0; i < femaleNeeded; i += 1) {
          group.push({ num: femaleList[femaleCursor], sex: "F" });
          femaleCursor += 1;
        }
        for (let i = 0; i < maleNeeded; i += 1) {
          group.push({ num: maleList[maleCursor], sex: "M" });
          maleCursor += 1;
        }
        return sortGroup(group);
      });
    }

    function renderGroups(groups) {
      groupsEl.innerHTML = "";
      document.body.classList.remove("board-mode");
      groups.forEach((members, index) => {
        const maleCount = members.filter((member) => member.sex === "M").length;
        const femaleCount = members.filter((member) => member.sex === "F").length;
        const card = document.createElement("section");
        card.className = "group-card";
        card.style.borderTopColor = colors[index % colors.length];
        card.innerHTML = `
          <div class="group-head">
            <div class="group-title">Group ${index + 1}</div>
            <div class="group-count">${members.length}人 / M:${maleCount} F:${femaleCount}</div>
          </div>
          <div class="members"></div>`;

        const membersEl = card.querySelector(".members");
        members.forEach((member) => {
          const chip = document.createElement("span");
          chip.className = `member ${member.sex.toLowerCase()}`;
          chip.innerHTML = `<span>${member.num}</span><span class="sex">${member.sex}</span>`;
          membersEl.appendChild(chip);
        });
        groupsEl.appendChild(card);
      });
    }

    function generate(strategy, randomize) {
      const minSize = Number.parseInt(minSizeInput.value, 10);
      const roster = CLASS_DATA[currentClass];
      const skip = parseSkipNumbers();
      const active = numbersFor(currentClass).filter((num) => !skip.includes(num));
      groupsEl.innerHTML = "";
      lastResult = null;

      if (!Number.isFinite(minSize) || minSize < 1) {
        setMessage("最低人数を1以上で入力してください。", true);
        return;
      }
      if (active.length < 1) {
        setMessage("対象人数が0人です。除外番号を確認してください。", true);
        return;
      }
      if (minSize > active.length) {
        setMessage("最低人数が対象人数より多くなっています。", true);
        return;
      }

      const sizes = makeGroupSizes(active.length, minSize);
      const groups = strategy === "gender"
        ? buildGenderGroups(active, roster, sizes, randomize)
        : buildCountGroups(active, roster, sizes, randomize);
      const createdAt = new Date();
      const strategyLabel = strategy === "gender"
        ? "B 性別均等"
        : "A 人数優先";
      const modeLabel = `${strategyLabel} / ${randomize ? "ランダム" : "番号順"}`;

      lastResult = {
        classId: currentClass,
        minSize,
        groupCount: groups.length,
        activeCount: active.length,
        skip,
        groups,
        mode: modeLabel,
        createdAt
      };

      renderGroups(groups);
      const minGroups = groups.filter((group) => group.length === minSize).length;
      const plusGroups = groups.length - minGroups;
      const sizeText = plusGroups
        ? `${minSize}人グループ ${minGroups} / ${minSize + 1}人グループ ${plusGroups}`
        : `${minSize}人グループ ${minGroups}`;
      const skipped = skip.length ? ` / 除外 ${skip.join(", ")}` : "";
      setMessage(`${active.length}人を最低${minSize}人で分けました（${sizeText}）${skipped}。`);
      summary.textContent = `${currentClass}組 / 対象 ${active.length}人 / ${groups.length}グループ`;
    }

    function formatDateTime(date) {
      const pad = (value) => String(value).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function formatFileDateTime(date) {
      const pad = (value) => String(value).padStart(2, "0");
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}`;
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function downloadCanvasAsJpg(canvas, fileName) {
      canvas.toBlob((blob) => {
        if (!blob) {
          setMessage("JPGの作成に失敗しました。", true);
          return;
        }
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
        setMessage("JPGを書き出しました。");
      }, "image/jpeg", 0.92);
    }

    function exportJpg() {
      if (!lastResult) {
        setMessage("先にAまたはBの方式でグループを生成してください。", true);
        return;
      }

      const dark = !document.body.classList.contains("theme-light");
      const bg = dark ? "#05070c" : "#f5f7fb";
      const panel = dark ? "#111827" : "#ffffff";
      const panel2 = dark ? "#1f2937" : "#eef3f7";
      const ink = dark ? "#f8fafc" : "#172033";
      const muted = dark ? "#a7b1c2" : "#647083";
      const line = dark ? "#334155" : "#d7dee8";
      const male = dark ? "#74c0fc" : "#2563eb";
      const female = dark ? "#f472b6" : "#db2777";
      const accent = dark ? "#c8ff5a" : "#0f766e";

      const cols = lastResult.groups.length <= 4 ? 2 : 3;
      const cardWidth = 420;
      const gap = 24;
      const margin = 42;
      const headerHeight = 150;
      const cardHeights = lastResult.groups.map((group) => 88 + Math.ceil(group.length / 6) * 46);
      const rows = [];
      for (let i = 0; i < cardHeights.length; i += cols) {
        rows.push(Math.max(...cardHeights.slice(i, i + cols)));
      }
      const width = margin * 2 + cols * cardWidth + (cols - 1) * gap;
      const height = margin * 2 + headerHeight + rows.reduce((sum, row) => sum + row, 0) + Math.max(0, rows.length - 1) * gap;
      const scale = 2;
      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = ink;
      ctx.font = "800 40px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("ランダムグループ生成", margin, margin + 42);
      ctx.fillStyle = muted;
      ctx.font = "500 22px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(`${lastResult.classId}組 / ${lastResult.mode}`, margin, margin + 78);
      ctx.fillText(`${lastResult.activeCount}人 / 最低${lastResult.minSize}人 / ${lastResult.groupCount}グループ`, margin, margin + 110);
      ctx.fillText(`作成日時: ${formatDateTime(lastResult.createdAt)}`, margin, margin + 140);

      let y = margin + headerHeight;
      lastResult.groups.forEach((group, index) => {
        const col = index % cols;
        const row = Math.floor(index / cols);
        if (col === 0 && index > 0) y += rows[row - 1] + gap;
        const x = margin + col * (cardWidth + gap);
        const cardHeight = cardHeights[index];
        const mCount = group.filter((member) => member.sex === "M").length;
        const fCount = group.filter((member) => member.sex === "F").length;

        ctx.fillStyle = panel;
        drawRoundedRect(ctx, x, y, cardWidth, cardHeight, 12);
        ctx.fill();
        ctx.strokeStyle = line;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = colors[index % colors.length];
        drawRoundedRect(ctx, x, y, cardWidth, 8, 8);
        ctx.fill();
        ctx.fillStyle = ink;
        ctx.font = "800 25px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText(`Group ${index + 1}`, x + 18, y + 42);
        ctx.fillStyle = muted;
        ctx.font = "700 18px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText(`${group.length}人 M:${mCount} F:${fCount}`, x + cardWidth - 150, y + 42);

        group.forEach((member, memberIndex) => {
          const chipX = x + 18 + (memberIndex % 6) * 64;
          const chipY = y + 64 + Math.floor(memberIndex / 6) * 46;
          ctx.fillStyle = panel2;
          drawRoundedRect(ctx, chipX, chipY, 52, 34, 8);
          ctx.fill();
          ctx.strokeStyle = member.sex === "M" ? male : female;
          ctx.stroke();
          ctx.fillStyle = ink;
          ctx.font = "800 20px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.fillText(String(member.num), chipX + 10, chipY + 23);
          ctx.fillStyle = member.sex === "M" ? male : female;
          ctx.font = "800 11px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.fillText(member.sex, chipX + 34, chipY + 23);
        });
      });

      ctx.fillStyle = accent;
      ctx.font = "700 16px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("Copyright HOSOI Toshikatsu", margin, height - 18);
      downloadCanvasAsJpg(canvas, `group-${lastResult.classId}-${formatFileDateTime(lastResult.createdAt)}.jpg`);
    }

    function touchDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function enterBoardMode() {
      if (!lastResult) return;
      document.body.classList.add("board-mode");
      requestAnimationFrame(() => groupsEl.scrollIntoView({ block: "start" }));
    }

    function exitBoardMode() {
      document.body.classList.remove("board-mode");
      pinchStartDistance = 0;
    }

    document.querySelectorAll(".class-btn").forEach((button) => {
      button.addEventListener("click", () => selectClass(button.dataset.classId));
    });
    document.querySelector("#countOrderedBtn").addEventListener("click", () => generate("count", false));
    document.querySelector("#countRandomBtn").addEventListener("click", () => generate("count", true));
    document.querySelector("#genderOrderedBtn").addEventListener("click", () => generate("gender", false));
    document.querySelector("#genderRandomBtn").addEventListener("click", () => generate("gender", true));
    exportBtn.addEventListener("click", exportJpg);
    boardExitBtn.addEventListener("click", exitBoardMode);
    themeBtn.addEventListener("click", () => setTheme(document.body.classList.contains("theme-light") ? "dark" : "light"));
    minSizeInput.addEventListener("change", () => saveSetting("ipad-group-min-size", minSizeInput.value));
    skipNumbers.addEventListener("change", () => saveSetting("ipad-group-skip", skipNumbers.value));
    groupsEl.addEventListener("dblclick", enterBoardMode);
    groupsEl.addEventListener("touchstart", (event) => {
      if (event.touches.length === 2 && lastResult) {
        pinchStartDistance = touchDistance(event.touches);
      }
    }, { passive: true });
    groupsEl.addEventListener("touchmove", (event) => {
      if (event.touches.length !== 2 || !pinchStartDistance || !lastResult) return;
      const scale = touchDistance(event.touches) / pinchStartDistance;
      if (scale > 1.12) {
        event.preventDefault();
        enterBoardMode();
      } else if (scale < 0.82 && document.body.classList.contains("board-mode")) {
        event.preventDefault();
        exitBoardMode();
      }
    }, { passive: false });
    groupsEl.addEventListener("touchend", () => {
      pinchStartDistance = 0;
    }, { passive: true });

    setTheme(loadSetting("ipad-group-theme", "dark"));
    minSizeInput.value = loadSetting("ipad-group-min-size", "3");
    skipNumbers.value = loadSetting("ipad-group-skip", "");
    selectClass(currentClass);

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    }
  </script>
</body>
</html>
